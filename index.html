<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter PRO DEBUG</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    overflow:hidden;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:22px;
    padding:12px;
}

.result{
    padding:12px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}

.result:hover{ background:#111; }

.artist{ opacity:.7; }

#lyrics{
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<div id="app">
    <h1>Lyrics Prompter PRO</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<script>

/* =========================
   DEBUG HUD（重要）
========================= */
const debug = document.createElement("div");
debug.style = `
position:fixed;
bottom:10px;
right:10px;
background:rgba(0,0,0,0.7);
color:#0f0;
font-size:12px;
padding:8px;
max-width:300px;
z-index:9999;
white-space:pre;
`;
document.body.appendChild(debug);

function log(msg){
    debug.innerText = msg;
}

/* =========================
   STATE
========================= */
const state = {
    player: null,
    lines: [],
    index: 0,
    mode: "auto",
    offset: 0,
    ytReady: false,
    syncStarted: false
};

/* =========================
   YT READY
========================= */
window.onYouTubeIframeAPIReady = () => {
    state.ytReady = true;
    log("YT READY");
};

/* =========================
   UI
========================= */
const searchBox = document.getElementById("search");
const results = document.getElementById("results");

let timer;

/* =========================
   SEARCH
========================= */
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();
    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>search(q),300);
});

async function search(q){

    log("searching...");

    results.innerHTML = "検索中...";

    const res = await fetch(
        `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=20`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.results.forEach(t=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;

        div.onclick = ()=>fetchLyrics(t);

        results.appendChild(div);
    });

    log("search done");
}

/* =========================
   LYRICS
========================= */
async function fetchLyrics(track){

    log("fetch lyrics...");

    results.innerHTML = "歌詞取得中...";

    const res = await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;

        div.onclick = ()=>startSession(item);

        results.appendChild(div);
    });

    log("lyrics loaded");
}

/* =========================
   PARSE
========================= */
function parseLRC(lrc){

    return lrc.split("\n")
    .map(l=>{
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;

        return {
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        };
    })
    .filter(Boolean);
}

/* =========================
   SESSION
========================= */
function startSession(item){

    log("session start");

    if(item.syncedLyrics){
        state.lines = parseLRC(item.syncedLyrics);
    }else{
        state.lines = item.plainLyrics
            .split("\n")
            .filter(v=>v.trim())
            .map(t=>({time:0,text:t}));
    }

    renderShell();
}

/* =========================
   SHELL
========================= */
function renderShell(){

    log("render shell");

    document.body.innerHTML = "";

    const wrap = document.createElement("div");
    wrap.style.padding = "30px";

    const playerDiv = document.createElement("div");
    const lyricsDiv = document.createElement("div");

    wrap.appendChild(playerDiv);
    wrap.appendChild(lyricsDiv);
    document.body.appendChild(wrap);

    state.lyricsDiv = lyricsDiv;

    const url = prompt("YouTube URL（空でもOK）");

    const id = getYoutubeId(url);

    if(id){

        if(!state.ytReady){
            log("YT not ready → waiting");
        }

        state.player = new YT.Player(playerDiv, {
            videoId: id,
            width: 560,
            height: 315,
            events:{
                onReady: () => {
                    log("PLAYER READY");
                    startSync();
                }
            }
        });

    }else{
        log("no video");
    }

    render();
    bindKeys();
}

/* =========================
   SYNC ENGINE（修正ポイント）
========================= */
function startSync(){

    if(state.syncStarted) return;

    state.syncStarted = true;

    log("sync started");

    setInterval(()=>{

        if(state.mode !== "auto") return;
        if(!state.player) return;

        const t = state.player.getCurrentTime() + state.offset;

        for(let i=0;i<state.lines.length;i++){

            if(state.lines[i].time > t){

                state.index = Math.max(0,i-1);
                render();
                break;
            }
        }

    },100);
}

/* =========================
   RENDER
========================= */
function render(){

    const i = state.index;
    const l = state.lines;

    state.lyricsDiv.innerHTML = `
        <div style="font-size:40px;opacity:.4">${l[i+1]?.text||""}</div>
        <div style="font-size:80px;margin:20px 0;font-weight:bold">${l[i]?.text||""}</div>
        <div style="font-size:40px;opacity:.2">${l[i+2]?.text||""}</div>
    `;

    log(`render index=${i}`);
}

/* =========================
   CONTROLS
========================= */
function bindKeys(){

    document.onkeydown = (e)=>{

        if(e.key==="ArrowRight"){
            state.index++;
            render();
        }

        if(e.key==="ArrowLeft"){
            state.index = Math.max(0,state.index-1);
            render();
        }

        if(e.key==="m"){
            state.mode = state.mode==="auto"?"manual":"auto";
            log("mode="+state.mode);
        }

        if(e.key==="+"){
            state.offset += 0.1;
            log("offset="+state.offset);
        }

        if(e.key==="-"){
            state.offset -= 0.1;
            log("offset="+state.offset);
        }

        if(e.key==="f"){
            if(!document.fullscreenElement){
                document.documentElement.requestFullscreen();
            }else{
                document.exitFullscreen();
            }
        }
    };
}

/* =========================
   UTIL
========================= */
function getYoutubeId(url){

    if(!url) return "";

    const m = url.match(/(?:v=|youtu\.be\/)([^&]+)/i);
    return m ? m[1] : "";
}

</script>

</body>
</html>
