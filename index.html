<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

/* screen */
.screen{display:none;padding:10px;}
.screen.active{display:block;}

/* search */
#search{
    width:100%;
    font-size:20px;
    padding:10px;
    box-sizing:border-box;
}

.result{
    padding:10px;
    border:1px solid #333;
    margin-top:6px;
}

/* =========================
   PLAYER AREA（UIのみ修正）
========================= */

#playerWrap{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

/* ★動画サイズ調整（機能はそのまま） */
.player{
    width:360px;
    height:202px;
    border:1px solid #222;
}

/* =========================
   LYRICS
========================= */

#lyricsWrap{
    height:calc(100vh - 300px);
    overflow-y:auto;
    border:1px solid #222;
    margin-top:10px;
}

.line{
    text-align:center;
    padding:10px;
    min-height:42px;
}

.now{
    font-size:56px;
    font-weight:bold;
}

.side{
    font-size:26px;
    opacity:.35;
}

/* =========================
   BOTTOM BAR（維持）
========================= */

.bottomBar{
    position:fixed;
    bottom:8px;
    left:8px;
    right:8px;
    display:flex;
    justify-content:space-between;
    z-index:9999;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
    cursor:pointer;
}

/* warn（軽量化） */
#warn{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:24px;
    line-height:24px;
    font-size:12px;
    background:rgba(255,0,0,0.8);
    text-align:center;
    display:none;
    z-index:99999;
}
</style>
</head>

<body>

<div id="warn"></div>

<!-- TOP -->
<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<!-- PLAYER -->
<div id="playerScreen" class="screen">

    <div id="playerWrap"></div>
    <div id="lyricsWrap"></div>

    <div class="bottomBar">
        <div style="display:flex;gap:6px;">
            <button id="modeBtn">AUTO</button>
            <button id="syncBtn">SYNC</button>
            <button id="minusBtn">-</button>
            <button id="plusBtn">+</button>
        </div>

        <button id="backBtn">TOP</button>
    </div>

</div>

<script>

const state={
    player:null,
    lines:[],
    index:0,
    mode:"auto",
    offset:0,
    wheelLock:false,
    timer:null,
    ready:false,
    lineEls:[]
};

/* ================= WARN ================= */
function warn(msg){
    const el=document.getElementById("warn");
    el.style.display="block";
    el.textContent="⚠ "+msg;

    clearTimeout(el._t);
    el._t=setTimeout(()=>el.style.display="none",2000);
}

/* ================= SEARCH ================= */
const searchBox=document.getElementById("search");
const results=document.getElementById("results");

let timer;

searchBox.addEventListener("input",()=>{
    clearTimeout(timer);
    const q=searchBox.value.trim();
    if(q.length<2) return results.innerHTML="";
    timer=setTimeout(()=>search(q),300);
});

async function search(q){

    results.innerHTML="検索中...";

    const res=await fetch(
        "https://itunes.apple.com/search?term="
        +encodeURIComponent(q)
        +"&entity=song&country=JP&limit=20"
    );

    const data=await res.json();
    results.innerHTML="";

    data.results.forEach(t=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${t.trackName}</div>
            <div style="opacity:.6">${t.artistName}</div>
        `;
        d.onclick=()=>fetchLyrics(t);
        results.appendChild(d);
    });
}

/* ================= LYRICS ================= */
async function fetchLyrics(track){

    results.innerHTML="歌詞取得中...";

    const res=await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data=await res.json();
    results.innerHTML="";

    if(!data.length){
        warn("歌詞なし");
        return;
    }

    data.forEach(item=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${item.trackName}</div>
            <div style="opacity:.6">${item.artistName}</div>
        `;
        d.onclick=()=>start(item);
        results.appendChild(d);
    });
}

/* ================= PARSE ================= */
function parseLRC(lrc){
    return lrc.split("\n")
    .map(l=>{
        const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;
        return {
            time:parseInt(m[1])*60+parseFloat(m[2]),
            text:m[3].trim()
        };
    })
    .filter(Boolean);
}

/* ================= START ================= */
function start(item){

    warn(item.syncedLyrics ? "SYNC MODE" : "ESTIMATED MODE");

    state.lines=item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map((t,i)=>({time:i*3,text:t}));

    buildPlayer();
    showScreen("player");
    initLyrics();
    render();
}

/* ================= PLAYER ================= */
function buildPlayer(){

    const wrap=document.getElementById("playerWrap");
    wrap.innerHTML="";

    const div=document.createElement("div");
    div.className="player";
    wrap.appendChild(div);

    const url=prompt("YouTube URL");
    const id=getYoutubeId(url);

    if(state.player) state.player.destroy();

    state.player=new YT.Player(div,{
        videoId:id,
        width:360,
        height:202,
        events:{
            onReady:()=>{
                state.ready=true;
                state.player.playVideo();
                startSync();
            }
        }
    });

    state.index=0;
}

/* ================= SYNC ================= */
function getTime(){
    return state.player.getCurrentTime() + state.offset;
}

function sync(){
    const t=state.player.getCurrentTime();
    const lt=state.lines[state.index]?.time;
    if(lt==null) return;
    state.offset=lt-t;
}

/* ================= LOOP ================= */
function startSync(){

    if(state.timer) clearInterval(state.timer);

    state.timer=setInterval(()=>{

        if(!state.ready||!state.player) return;

        const t=getTime();

        if(state.mode==="auto"){
            for(let i=0;i<state.lines.length;i++){
                const next=state.lines[i+1];
                if(!next||next.time>t){
                    state.index=i;
                    render();
                    break;
                }
            }
        }

    },120);
}

function initLyrics(){

    const wrap=document.getElementById("lyricsWrap");

    wrap.innerHTML="";

    state.lineEls=[];

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");

        d.className="line side";
        d.textContent=l.text;

        wrap.appendChild(d);

        state.lineEls.push(d);
    });
}
    
/* ================= RENDER ================= */
function render(){

    if(!state.lineEls.length) return;

    for(let i=0;i<state.lineEls.length;i++){

        const el=state.lineEls[i];

        el.classList.remove("now","side");

        if(i===state.index){
            el.classList.add("now");
        }else{
            el.classList.add("side");
        }
    }

    if(state.mode==="auto"){

        const el=state.lineEls[state.index];

        if(el){

            el.scrollIntoView({
                block:"center",
                behavior:"smooth"
            });
        }
    }
}

/* ================= WHEEL ================= */
document.getElementById("lyricsWrap").addEventListener("wheel",(e)=>{

    if(state.mode==="auto") return;
    if(state.wheelLock) return;

    state.wheelLock=true;

    const dir=e.deltaY>0?1:-1;

    state.index=Math.max(0,Math.min(state.lines.length-1,state.index+dir));

    if(state.player && state.mode==="manual"){

        const t=state.player.getCurrentTime();

        const lt=state.lines[state.index]?.time;

        if(lt!=null){
            state.offset = lt - t;
        }
    }
    
    render();

    setTimeout(()=>state.wheelLock=false,100);

},{passive:true});

/* ================= CONTROLS ================= */
document.getElementById("modeBtn").onclick=()=>{
    state.mode=state.mode==="auto"?"manual":"auto";
    document.getElementById("modeBtn").textContent=state.mode.toUpperCase();
};

document.getElementById("syncBtn").onclick=sync;

document.getElementById("plusBtn").onclick=()=>{

    if(state.mode==="auto"){

        state.index=Math.min(
            state.lines.length-1,
            state.index+1
        );

        sync();

        render();

    }else{

        state.offset+=0.1;
    }
};

document.getElementById("minusBtn").onclick=()=>{

    if(state.mode==="auto"){

        state.index=Math.max(
            0,
            state.index-1
        );

        sync();

        render();

    }else{

        state.offset-=0.1;
    }
};

/* ================= BACK ================= */
document.getElementById("backBtn").onclick=()=>{
    if(state.timer) clearInterval(state.timer);
    if(state.player) state.player.destroy();

    state.player=null;
    state.timer=null;
    state.ready=false;
    state.lines=[];
    state.index=0;
    state.offset=0;
    state.mode="auto";

    document.getElementById("lyricsWrap").innerHTML="";
    document.getElementById("playerWrap").innerHTML="";
    document.getElementById("warn").style.display="none";

    showScreen("top");
};

/* ================= UTIL ================= */
function getYoutubeId(url){
    const m=url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m?m[1]:"";
}

function showScreen(n){
    document.getElementById("topScreen").classList.remove("active");
    document.getElementById("playerScreen").classList.remove("active");

    if(n==="top") document.getElementById("topScreen").classList.add("active");
    if(n==="player") document.getElementById("playerScreen").classList.add("active");
}

</script>

</body>
</html>
