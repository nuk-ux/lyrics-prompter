<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

/* ===== layout ===== */
.screen{display:none;padding:20px;}
.screen.active{display:block;}

#search{width:100%;font-size:22px;padding:12px;}

.result{
    padding:10px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}
.artist{opacity:.6;font-size:14px;}

/* ===== player ===== */
.player{
    width:100%;
    max-width:520px;
    aspect-ratio:16/9;
    margin:20px auto;
}

/* ===== lyrics ===== */
#lyricsWrap{
    height:60vh; /* ★重要：固定やめた */
    overflow:hidden;
    margin-top:20px;
    border:1px solid #222;
}

#lyricsInner{
    position:relative;
    top:0;
    transition:transform .15s linear;
}

.line{
    text-align:center;
    padding:10px 0;
}

.now{
    font-size:64px;
    font-weight:bold;
}

.side{
    font-size:28px;
    opacity:.35;
}

/* ===== controls ===== */
#controls{
    position:fixed;
    bottom:10px;
    left:10px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
}
button:hover{background:#222;}

.topbar{position:fixed;top:10px;left:10px;}
</style>
</head>

<body>

<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<div id="playerScreen" class="screen">

    <div class="topbar">
        <button id="backBtn">← TOP</button>
    </div>

    <div id="playerWrap"></div>

    <div id="lyricsWrap">
        <div id="lyricsInner"></div>
    </div>
</div>

<div id="controls"></div>

<script>

const state={
    player:null,
    ready:false,
    lines:[],
    index:0,
    offset:0,
    mode:"auto",
    timer:null
};

/* ================= SEARCH ================= */
const searchBox=document.getElementById("search");
const results=document.getElementById("results");

let timer;

searchBox.addEventListener("input",()=>{
    clearTimeout(timer);
    const q=searchBox.value.trim();
    if(q.length<2){results.innerHTML="";return;}
    timer=setTimeout(()=>search(q),300);
});

async function search(q){
    results.innerHTML="検索中...";

    const res=await fetch(
        "https://itunes.apple.com/search?term="
        + encodeURIComponent(q)
        + "&entity=song&country=JP&limit=20"
    );

    const data=await res.json();

    results.innerHTML="";

    data.results.forEach(t=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;
        d.onclick=()=>fetchLyrics(t);
        results.appendChild(d);
    });
}

/* ================= LYRICS ================= */
async function fetchLyrics(track){

    results.innerHTML="歌詞取得中...";

    const res=await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data=await res.json();

    results.innerHTML="";

    data.forEach(item=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;
        d.onclick=()=>start(item);
        results.appendChild(d);
    });
}

/* ================= PARSE ================= */
function parseLRC(lrc){
    return lrc.split("\n")
    .map(l=>{
        const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;
        return {
            time:parseInt(m[1])*60+parseFloat(m[2]),
            text:m[3].trim()
        };
    })
    .filter(Boolean);
}

/* ================= START ================= */
function start(item){

    state.lines=item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map((t,i)=>({time:i*3,text:t}));

    buildPlayer();
    showScreen("player");
    buildControls();
    render();
}

/* ================= PLAYER ================= */
function buildPlayer(){

    const wrap=document.getElementById("playerWrap");
    wrap.innerHTML="";

    const div=document.createElement("div");
    div.className="player";
    wrap.appendChild(div);

    const url=prompt("YouTube URL");
    const id=getYoutubeId(url);

    if(state.player){
        state.player.destroy();
    }

    state.player=new YT.Player(div,{
        videoId:id,
        width:520,
        height:292,
        events:{
            onReady:()=>{
                state.ready=true;
                state.player.playVideo();
                startSync();
            }
        }
    });

    state.index=0;
}

/* ================= SCROLL CORE ================= */
function scroll(d){

    state.index=Math.max(
        0,
        Math.min(state.lines.length-1,state.index+d)
    );

    syncFromManual(); // ★重要
    render();
}

/* ================= MANUAL → TIME補正 ================= */
function syncFromManual(){

    const t=state.player.getCurrentTime();
    const lt=state.lines[state.index]?.time;

    if(!lt) return;

    state.offset = lt - t;
    state.mode = "manual";
}

/* ================= CONTROLS ================= */
function buildControls(){

    const c=document.getElementById("controls");

    c.innerHTML=`
        <button id="mode">${state.mode}</button>
        <button id="sync">sync</button>
        <button id="up">+offset</button>
        <button id="down">-offset</button>
        <button id="prev">▲</button>
        <button id="next">▼</button>
    `;

    document.getElementById("mode").onclick=()=>{
        state.mode=state.mode==="auto"?"manual":"auto";
        document.getElementById("mode").innerText=state.mode;
    };

    document.getElementById("sync").onclick=()=>{
        const t=state.player.getCurrentTime();
        const lt=state.lines[state.index]?.time||0;
        state.offset=lt-t;
    };

    document.getElementById("up").onclick=()=>state.offset+=0.1;
    document.getElementById("down").onclick=()=>state.offset-=0.1;

    document.getElementById("prev").onclick=()=>scroll(-1);
    document.getElementById("next").onclick=()=>scroll(1);
}

/* ================= SYNC ================= */
function startSync(){

    if(state.timer) clearInterval(state.timer);

    state.timer=setInterval(()=>{

        if(!state.ready||!state.player) return;

        const t=state.player.getCurrentTime()+state.offset;

        if(state.mode==="auto"){

            for(let i=0;i<state.lines.length;i++){

                const next=state.lines[i+1];

                if(!next||next.time>t){
                    state.index=i;
                    render();
                    break;
                }
            }
        }

    },100);
}

/* ================= RENDER ================= */
function render(){

    const wrap=document.getElementById("lyricsInner");
    wrap.innerHTML="";

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");
        d.className="line";

        if(i===state.index) d.classList.add("now");
        else d.classList.add("side");

        d.textContent=l.text;
        wrap.appendChild(d);
    });

    wrap.style.transform=`translateY(${-state.index*72}px)`;
}

/* ================= BACK ================= */
document.getElementById("backBtn").onclick=()=>{

    if(state.player) state.player.destroy();

    state.player=null;
    state.ready=false;
    state.index=0;
};

/* ================= UTIL ================= */
function getYoutubeId(url){
    const m=url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m?m[1]:"";
}

function showScreen(name){
    document.getElementById("topScreen").classList.remove("active");
    document.getElementById("playerScreen").classList.remove("active");
    if(name==="top") document.getElementById("topScreen").classList.add("active");
    if(name==="player") document.getElementById("playerScreen").classList.add("active");
}

</script>

</body>
</html>
