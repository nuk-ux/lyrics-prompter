<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lyrics Prompter</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:24px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:15px;
    border:1px solid #333;
    margin-top:10px;
    cursor:pointer;
}

.result:hover{
    background:#111;
}

.artist{
    opacity:.7;
}
</style>
</head>

<body>

<div id="app">
    <h1>Lyrics Prompter</h1>
    <input id="search" placeholder="曲名またはアーティスト">
    <div id="results"></div>
</div>

<script>

const searchBox = document.getElementById("search");
const results = document.getElementById("results");

let timer;

searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();

    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>{
        searchSongs(q);
    },300);

});

async function searchSongs(q){

    results.innerHTML = "検索中...";

    const url =
    "https://itunes.apple.com/search?term="
    + encodeURIComponent(q)
    + "&entity=song&limit=30";

    try{

        const res = await fetch(url);
        const data = await res.json();

        results.innerHTML = "";

        data.results.forEach(track=>{

            const div = document.createElement("div");
            div.className = "result";

            div.innerHTML = `
                <div>${track.trackName}</div>
                <div class="artist">${track.artistName}</div>
            `;

            div.onclick = ()=>selectTrack(track);

            results.appendChild(div);

        });

    }catch(e){
        results.innerHTML = "検索失敗";
    }

}

async function selectTrack(track){

    results.innerHTML = "歌詞検索中...";

    const url =
    "https://lrclib.net/api/search?"
    + "track_name=" + encodeURIComponent(track.trackName)
    + "&artist_name=" + encodeURIComponent(track.artistName);

    try{

        const res = await fetch(url);
        const data = await res.json();

        results.innerHTML = "";

        if(!data.length){
            results.innerHTML = "歌詞なし";
            return;
        }

        data.forEach(item=>{

            const div = document.createElement("div");
            div.className = "result";

            div.innerHTML = `
                <div>${item.trackName}</div>
                <div class="artist">${item.artistName}</div>
            `;

            div.onclick = ()=>loadLyrics(item);

            results.appendChild(div);

        });

    }catch(e){
        results.innerHTML = "歌詞取得失敗";
    }

}

function loadLyrics(item){

    if(item.syncedLyrics){
        const lines = parseLRC(item.syncedLyrics);
        showLyrics(lines);
    }else{
        const lines = item.plainLyrics
        .split("\n")
        .filter(v=>v.trim())
        .map(t=>({ time:0, text:t }));

        showLyrics(lines);
    }

}

function parseLRC(lrc){

    const result = [];

    lrc.split("\n").forEach(row=>{

        const m = row.match(/\[(\d+):(\d+\.\d+)\](.*)/);

        if(!m) return;

        result.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        });

    });

    return result;

}

let player;

function showLyrics(lines){

    document.body.innerHTML = "";
    document.body.style.background = "#000";
    document.body.style.color = "#fff";

    let index = 0;

    const container = document.createElement("div");
    container.style.padding = "40px";
    document.body.appendChild(container);

    const videoArea = document.createElement("div");
    const lyricsArea = document.createElement("div");

    container.appendChild(videoArea);
    container.appendChild(lyricsArea);

    const youtubeUrl = prompt("YouTube URLを入力");
    const videoId = getYoutubeId(youtubeUrl);

    if(videoId){

        player = new YT.Player(videoArea, {
            videoId: videoId,
            width: 560,
            height: 315
        });

    }

    function render(){

        lyricsArea.innerHTML = `
            <div style="font-size:40px;opacity:.5">
                ${lines[index+1]?.text || ""}
            </div>

            <div style="font-size:80px;margin:30px 0;font-weight:bold">
                ${lines[index]?.text || ""}
            </div>

            <div style="font-size:40px;opacity:.3">
                ${lines[index+2]?.text || ""}
            </div>
        `;
    }

    render();

    // ★ここが正しい場所（1回だけ）
    setInterval(()=>{

        if(!player || !player.getCurrentTime) return;

        const t = player.getCurrentTime();

        for(let i=0;i<lines.length;i++){

            if(lines[i].time > t){

                index = Math.max(0, i-1);
                render();
                break;
            }
        }

    },200);

    document.onkeydown = (e)=>{

        if(e.key==="ArrowRight"){
            index = Math.min(lines.length-1,index+1);
            render();
        }

        if(e.key==="ArrowLeft"){
            index = Math.max(0,index-1);
            render();
        }

        if(e.key==="f"||e.key==="F"){
            if(!document.fullscreenElement){
                document.documentElement.requestFullscreen();
            }else{
                document.exitFullscreen();
            }
        }

        if(e.key==="s"||e.key==="S"){
            location.reload();
        }

    };

}

function getYoutubeId(url){

    const m = url.match(/(?:v=|youtu\.be\/)([^&]+)/i);
    return m ? m[1] : "";
}

</script>

</body>
</html>
