<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

/* screens */
.screen{display:none;padding:20px;}
.screen.active{display:block;}

/* search */
#search{
    width:100%;
    font-size:22px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:10px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}
.artist{opacity:.6;font-size:14px;}

/* player */
.player{
    width:100%;
    max-width:520px;
    aspect-ratio:16/9;
    margin:20px auto;
}

/* lyrics */
#lyricsWrap{
    height:68vh;
    overflow-y:auto;
    border:1px solid #222;
    margin-top:20px;
}

.line{
    text-align:center;
    padding:10px;
    min-height:40px;
}

.now{
    font-size:60px;
    font-weight:bold;
}

.side{
    font-size:28px;
    opacity:.35;
}

/* =========================
   BOTTOM HUD（ここが正解）
========================= */
.bottomBar{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    z-index:10000;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 12px;
    cursor:pointer;
}

button:hover{background:#222;}

/* warn */
#warn{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#ff0033;
    color:#fff;
    padding:8px;
    text-align:center;
    display:none;
    z-index:99999;
}
</style>
</head>

<body>

<div id="warn"></div>

<!-- TOP -->
<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<!-- PLAYER -->
<div id="playerScreen" class="screen">

    <div id="playerWrap"></div>

    <div id="lyricsWrap"></div>

    <!-- ★BOTTOM HUD（最重要修正） -->
    <div class="bottomBar">
        <button id="modeBtn">AUTO</button>
        <button id="backBtn">← TOP</button>
    </div>

</div>

<script>

const state = {
    player:null,
    timer:null,
    ready:false,
    lines:[],
    index:0,
    offset:0,
    mode:"auto"
};

/* ================= WARN ================= */
function warn(msg){
    const el=document.getElementById("warn");
    el.style.display="block";
    el.textContent="⚠ "+msg;
}

/* ================= SEARCH ================= */
const searchBox=document.getElementById("search");
const results=document.getElementById("results");

let timer;

searchBox.addEventListener("input",()=>{
    clearTimeout(timer);
    const q=searchBox.value.trim();
    if(q.length<2) return results.innerHTML="";
    timer=setTimeout(()=>search(q),300);
});

async function search(q){

    results.innerHTML="検索中...";

    const res=await fetch(
        "https://itunes.apple.com/search?term="
        +encodeURIComponent(q)
        +"&entity=song&country=JP&limit=20"
    );

    const data=await res.json();
    results.innerHTML="";

    data.results.forEach(t=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;
        d.onclick=()=>fetchLyrics(t);
        results.appendChild(d);
    });
}

/* ================= LYRICS ================= */
async function fetchLyrics(track){

    results.innerHTML="歌詞取得中...";

    const res=await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data=await res.json();
    results.innerHTML="";

    if(!data.length){
        warn("歌詞なし");
        return;
    }

    data.forEach(item=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;
        d.onclick=()=>start(item);
        results.appendChild(d);
    });
}

/* ================= PARSE ================= */
function parseLRC(lrc){
    return lrc.split("\n")
    .map(l=>{
        const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;
        return {
            time:parseInt(m[1])*60+parseFloat(m[2]),
            text:m[3].trim()
        };
    })
    .filter(Boolean);
}

/* ================= START ================= */
function start(item){

    warn(item.syncedLyrics ? "SYNC MODE" : "ESTIMATED MODE");

    state.lines=item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map((t,i)=>({time:i*3,text:t}));

    buildPlayer();
    showScreen("player");
    render();
}

/* ================= PLAYER ================= */
function buildPlayer(){

    const wrap=document.getElementById("playerWrap");
    wrap.innerHTML="";

    const div=document.createElement("div");
    div.className="player";
    wrap.appendChild(div);

    const url=prompt("YouTube URL");
    const id=getYoutubeId(url);

    if(state.player) state.player.destroy();

    state.player=new YT.Player(div,{
        videoId:id,
        width:520,
        height:292,
        events:{
            onReady:()=>{
                state.ready=true;
                state.player.playVideo();
                startSync();
            }
        }
    });

    state.index=0;
}

/* ================= TIME ================= */
function getTime(){
    return state.player.getCurrentTime() + state.offset;
}

/* ================= SYNC ================= */
function syncFromManual(){
    const t=state.player.getCurrentTime();
    const lt=state.lines[state.index]?.time;
    if(lt==null) return;
    state.offset=lt-t;
}

/* ================= SYNC LOOP ================= */
function startSync(){

    if(state.timer) clearInterval(state.timer);

    state.timer=setInterval(()=>{

        if(!state.ready||!state.player){
            warn("動画未準備");
            return;
        }

        const t=getTime();

        if(state.mode==="auto"){

            for(let i=0;i<state.lines.length;i++){
                const next=state.lines[i+1];
                if(!next||next.time>t){
                    state.index=i;
                    render();
                    break;
                }
            }
        }

    },120);
}

/* ================= RENDER ================= */
function render(){

    const wrap=document.getElementById("lyricsWrap");
    wrap.innerHTML="";

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");
        d.className="line";

        if(i===state.index) d.classList.add("now");
        else d.classList.add("side");

        d.textContent=l.text;
        wrap.appendChild(d);
    });

    const el=document.querySelector(".now");
    if(el){
        el.scrollIntoView({block:"center"});
    }
}

/* ================= WHEEL（AUTO無効化） ================= */
document.addEventListener("wheel",(e)=>{

    if(state.mode==="auto") return; // ★重要：AUTOでは無効

    const dir=e.deltaY>0?1:-1;

    state.index=Math.max(0,Math.min(state.lines.length-1,state.index+dir));

    syncFromManual();
    render();

},{passive:true});

/* ================= MODE ================= */
document.getElementById("modeBtn").onclick=()=>{
    state.mode=state.mode==="auto"?"manual":"auto";
    document.getElementById("modeBtn").textContent=state.mode.toUpperCase();
};

/* ================= BACK ================= */
document.getElementById("backBtn").onclick=()=>{

    if(state.timer) clearInterval(state.timer);
    if(state.player) state.player.destroy();

    state.timer=null;
    state.player=null;
    state.ready=false;
    state.index=0;
    state.offset=0;
    state.mode="auto";

    document.getElementById("lyricsWrap").innerHTML="";
    document.getElementById("playerWrap").innerHTML="";
    document.getElementById("warn").style.display="none";

    showScreen("top");
};

/* ================= UTIL ================= */
function getYoutubeId(url){
    const m=url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m?m[1]:"";
}

function showScreen(n){
    document.getElementById("topScreen").classList.remove("active");
    document.getElementById("playerScreen").classList.remove("active");

    if(n==="top") document.getElementById("topScreen").classList.add("active");
    if(n==="player") document.getElementById("playerScreen").classList.add("active");
}

</script>

</body>
</html>
