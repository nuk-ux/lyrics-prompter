<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lyrics Prompter</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:24px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:15px;
    border:1px solid #333;
    margin-top:10px;
    cursor:pointer;
}

.result:hover{
    background:#111;
}

.artist{
    opacity:.7;
}

</style>
</head>
<body>

<div id="app">

    <h1>Lyrics Prompter</h1>

    <input
        id="search"
        placeholder="曲名またはアーティスト"
    >

    <div id="results"></div>

</div>

<script>

const searchBox =
document.getElementById("search");

const results =
document.getElementById("results");

let timer;

searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q =
    searchBox.value.trim();

    if(q.length < 2){

        results.innerHTML = "";

        return;
    }

    timer =
    setTimeout(()=>{

        searchSongs(q);

    },300);

});

async function searchSongs(q){

    results.innerHTML =
    "検索中...";

    try{

        const url =
        "https://itunes.apple.com/search"
        + "?term="
        + encodeURIComponent(q)
        + "&entity=song"
        + "&limit=30";

        const res =
        await fetch(url);

        const data =
        await res.json();

        results.innerHTML = "";

        if(!data.results.length){

            results.innerHTML =
            "候補なし";

            return;
        }

        data.results.forEach(track=>{

            const div =
            document.createElement("div");

            div.className =
            "result";

            div.innerHTML = `
                <div>
                    ${track.trackName}
                </div>

                <div class="artist">
                    ${track.artistName}
                </div>
            `;

            div.onclick = ()=>{

                selectTrack(track);

            };

            results.appendChild(div);

        });

    }
    catch(err){

        console.error(err);

        results.innerHTML =
        "検索失敗";

    }

}

async function selectTrack(track){

    results.innerHTML = "歌詞検索中...";

    try{

        const url =
        "https://lrclib.net/api/search?"
        + "track_name="
        + encodeURIComponent(track.trackName)
        + "&artist_name="
        + encodeURIComponent(track.artistName);

        const res = await fetch(url);

        const lyricsList =
        await res.json();

        results.innerHTML = "";

        if(!lyricsList.length){

            results.innerHTML =
            "歌詞が見つかりません";

            return;
        }

        lyricsList.forEach(item=>{

            const div =
            document.createElement("div");

            div.className="result";

            div.innerHTML=`
                <div>${item.trackName}</div>
                <div class="artist">
                    ${item.artistName}
                </div>
            `;

            div.onclick=()=>{

                console.log(item);

                alert(
                    item.syncedLyrics
                    ? "同期歌詞あり"
                    : "歌詞のみ"
                );

            };

            results.appendChild(div);

        });

    }
    catch(err){

        console.error(err);

        results.innerHTML =
        "歌詞取得失敗";

    }

}

</script>

</body>
</html>
