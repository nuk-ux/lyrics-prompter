<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

.screen{ display:none; padding:20px; }
.screen.active{ display:block; }

#search{
    width:100%;
    font-size:22px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:12px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}

.result:hover{ background:#111; }

.artist{ opacity:.7; }

.player{
    width:100%;
    max-width:480px;
    aspect-ratio:16/9;
    margin:20px auto;
}

#lyrics{
    text-align:center;
    margin-top:30px;
    min-height:200px;
}

#controls{
    position:fixed;
    bottom:10px;
    left:10px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
}

button:hover{ background:#222; }

.topbar{
    position:fixed;
    top:10px;
    left:10px;
}
</style>
</head>

<body>

<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<div id="playerScreen" class="screen">

    <div class="topbar">
        <button id="backBtn">← TOP</button>
    </div>

    <div id="playerWrap"></div>
    <div id="lyrics"></div>
</div>

<div id="controls"></div>

<script>

const state = {
    player: null,
    lines: [],
    index: 0,
    offset: 0,
    speed: 1,
    mode: "auto",
    syncStarted: false,
    syncTimer: null
};

const topScreen = document.getElementById("topScreen");
const playerScreen = document.getElementById("playerScreen");
const results = document.getElementById("results");
const searchBox = document.getElementById("search");

let timer;

/* ================= screen ================= */
function showScreen(name){
    topScreen.classList.remove("active");
    playerScreen.classList.remove("active");
    if(name==="top") topScreen.classList.add("active");
    if(name==="player") playerScreen.classList.add("active");
}

/* ================= search ================= */
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();
    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>search(q),300);
});

async function search(q){

    results.innerHTML = "検索中...";

    const res = await fetch(
        "https://itunes.apple.com/search?term="
        + encodeURIComponent(q)
        + "&entity=song&country=JP&limit=30"
    );

    const data = await res.json();

    results.innerHTML = "";

    data.results.forEach(t=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;

        div.onclick = ()=>fetchLyrics(t);

        results.appendChild(div);
    });
}

/* ================= lyrics ================= */
async function fetchLyrics(track){

    results.innerHTML = "歌詞取得中...";

    const res = await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;

        div.onclick = ()=>start(item);

        results.appendChild(div);
    });
}

/* ================= parse ================= */
function parseLRC(lrc){

    return lrc.split("\n")
    .map(l=>{
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;

        return {
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        };
    })
    .filter(Boolean);
}

/* ================= start ================= */
function start(item){

    state.lines = item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map((t,i)=>({
                time: i * 3,
                text: t
            }));

    buildPlayer();
    showScreen("player");
    buildControls();
}

/* ================= player ================= */
function buildPlayer(){

    const wrap = document.getElementById("playerWrap");
    wrap.innerHTML = "";

    const div = document.createElement("div");
    div.className = "player";
    wrap.appendChild(div);

    const url = prompt("YouTube URL");
    const id = getYoutubeId(url);

    if(state.player){
        state.player.destroy();
        state.player = null;
    }

    state.player = new YT.Player(div, {
        videoId: id,
        width: 480,
        height: 270,
        events:{
            onReady: ()=>{
                state.player.playVideo();
                startSync();
            }
        }
    });

    state.index = 0;
}

/* ================= controls ================= */
function buildControls(){

    const c = document.getElementById("controls");

    c.innerHTML = `
        <button id="modeBtn">${state.mode}</button>
        <button id="speedDown">-speed</button>
        <button id="speedUp">+speed</button>
        <button id="sync">sync</button>
        <button id="reset">reset</button>
    `;

    document.getElementById("modeBtn").onclick = ()=>{

        state.mode = state.mode === "auto" ? "manual" : "auto";
        document.getElementById("modeBtn").innerText = state.mode;
    };

    document.getElementById("speedUp").onclick = ()=> state.speed += 0.1;
    document.getElementById("speedDown").onclick = ()=> state.speed = Math.max(0.3,state.speed-0.1);

    document.getElementById("sync").onclick = ()=>{

        const t = state.player.getCurrentTime();
        const lt = state.lines[state.index]?.time || 0;

        state.offset = lt - t;
    };

    document.getElementById("reset").onclick = ()=>{

        state.index = 0;
        state.player.seekTo(0);
        render();
    };
}

/* ================= sync ================= */
function startSync(){

    if(state.syncTimer) clearInterval(state.syncTimer);

    state.syncTimer = setInterval(()=>{

        if(!state.player) return;

        const t = (state.player.getCurrentTime() * state.speed) + state.offset;

        if(state.mode === "auto"){

            for(let i=0;i<state.lines.length;i++){

                const next = state.lines[i+1];

                if(!next || next.time > t){
                    state.index = i;
                    render();
                    break;
                }
            }
        }

    },120);
}

/* ================= manual scroll ================= */
document.onkeydown = (e)=>{

    if(state.mode !== "manual") return;

    if(e.key === "ArrowRight"){
        state.index = Math.min(state.lines.length-1, state.index+1);
        render();
    }

    if(e.key === "ArrowLeft"){
        state.index = Math.max(0, state.index-1);
        render();
    }
};

/* ================= render ================= */
function render(){

    const l = state.lines;

    document.getElementById("lyrics").innerHTML = `
        <div style="opacity:.4">${l[state.index-1]?.text||""}</div>
        <div style="font-size:60px;font-weight:bold">${l[state.index]?.text||""}</div>
        <div style="opacity:.4">${l[state.index+1]?.text||""}</div>
    `;
}

/* ================= util ================= */
function getYoutubeId(url){
    const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : "";
}

/* ================= back ================= */
document.getElementById("backBtn").onclick = ()=>{

    if(state.player){
        state.player.destroy();
        state.player = null;
    }

    state.syncTimer = null;
    state.index = 0;

    showScreen("top");
};

</script>

</body>
</html>
