<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:22px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:12px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}

.result:hover{
    background:#111;
}

.artist{ opacity:.7; }

/* 🎥 player responsive */
.player{
    width:100%;
    aspect-ratio:16/9;
    margin-top:20px;
}

.player iframe{
    width:100%;
    height:100%;
    border:0;
}

/* 🎤 lyrics */
#lyrics{
    text-align:center;
    margin-top:40px;
    padding:0 10px;
}

/* 🎛 controls */
.controls{
    position:fixed;
    bottom:10px;
    left:10px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    z-index:9999;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:8px 10px;
    cursor:pointer;
}

button:hover{
    background:#222;
}
</style>
</head>

<body>

<div id="app">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<script>

/* =========================
   STATE
========================= */
const state = {
    player: null,
    lines: [],
    index: 0,
    offset: 0,
    speed: 1.0,
    ytReady: false,
    syncStarted: false
};

const searchBox = document.getElementById("search");
const results = document.getElementById("results");

let timer;

/* =========================
   YOUTUBE READY
========================= */
window.onYouTubeIframeAPIReady = () => {
    state.ytReady = true;
};

/* =========================
   SEARCH (iTunes)
========================= */
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();
    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>search(q),300);
});

async function search(q){

    results.innerHTML = "検索中...";

    const res = await fetch(
        `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=20`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.results.forEach(t=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;

        div.onclick = ()=>fetchLyrics(t);

        results.appendChild(div);
    });
}

/* =========================
   LYRICS API
========================= */
async function fetchLyrics(track){

    results.innerHTML = "歌詞取得中...";

    const res = await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;

        div.onclick = ()=>start(item);

        results.appendChild(div);
    });
}

/* =========================
   PARSE LRC
========================= */
function parseLRC(lrc){

    return lrc.split("\n")
    .map(l=>{
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;

        return {
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        };
    })
    .filter(Boolean);
}

/* =========================
   START
========================= */
function start(item){

    if(item.syncedLyrics){
        state.lines = parseLRC(item.syncedLyrics);
    }else{
        state.lines = item.plainLyrics
            .split("\n")
            .filter(v=>v.trim())
            .map(t=>({time:0,text:t}));
    }

    showPlayer();
}

/* =========================
   UI INIT
========================= */
function showPlayer(){

    document.body.innerHTML = "";

    const wrap = document.createElement("div");
    wrap.style.padding = "20px";

    const playerDiv = document.createElement("div");
    playerDiv.className = "player";

    const lyricsDiv = document.createElement("div");
    lyricsDiv.id = "lyrics";

    wrap.appendChild(playerDiv);
    wrap.appendChild(lyricsDiv);
    document.body.appendChild(wrap);

    state.lyricsDiv = lyricsDiv;

    /* controls */
    const controls = document.createElement("div");
    controls.className = "controls";

    controls.innerHTML = `
        <button id="speedDown">-speed</button>
        <button id="speedUp">+speed</button>
        <button id="offsetDown">-offset</button>
        <button id="offsetUp">+offset</button>
        <button id="fullscreen">fullscreen</button>
    `;

    document.body.appendChild(controls);

    /* events */
    document.getElementById("speedUp").onclick = ()=>{
        state.speed = Math.min(3, state.speed + 0.1);
        log();
    };

    document.getElementById("speedDown").onclick = ()=>{
        state.speed = Math.max(0.3, state.speed - 0.1);
        log();
    };

    document.getElementById("offsetUp").onclick = ()=>{
        state.offset += 0.1;
        log();
    };

    document.getElementById("offsetDown").onclick = ()=>{
        state.offset -= 0.1;
        log();
    };

    document.getElementById("fullscreen").onclick = ()=>{
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen();
        }else{
            document.exitFullscreen();
        }
    };

    const url = prompt("YouTube URL（空OK）");
    const id = getYoutubeId(url);

    if(id && state.ytReady){

        state.player = new YT.Player(playerDiv, {
            videoId: id,
            width: 560,
            height: 315,
            events:{
                onReady: ()=>startSync()
            }
        });
    }

    render();
}

/* =========================
   SYNC ENGINE
========================= */
function startSync(){

    if(state.syncStarted) return;
    state.syncStarted = true;

    setInterval(()=>{

        if(!state.player) return;

        const t = state.player.getCurrentTime() + state.offset;
        const adjusted = t * state.speed;

        for(let i=0;i<state.lines.length;i++){

            if(state.lines[i].time > adjusted){

                state.index = Math.max(0,i-1);
                render();
                break;
            }
        }

    },100);
}

/* =========================
   RENDER
========================= */
function render(){

    const i = state.index;
    const l = state.lines;

    state.lyricsDiv.innerHTML = `
        <div style="font-size:40px;opacity:0.6">
            ${l[i-1]?.text || ""}
        </div>

        <div style="
            font-size:80px;
            margin:20px 0;
            font-weight:bold;
            opacity:1;
        ">
            ${l[i]?.text || ""}
        </div>

        <div style="font-size:40px;opacity:0.8">
            ${l[i+1]?.text || ""}
        </div>
    `;
}

/* =========================
   LOG (simple)
========================= */
function log(){
    console.log("speed:", state.speed, "offset:", state.offset);
}

/* =========================
   UTIL
========================= */
function getYoutubeId(url){

    if(!url) return "";

    const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : "";
}

</script>

</body>
</html>
