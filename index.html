<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lyrics Prompter PRO</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    overflow:hidden;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:24px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:15px;
    border:1px solid #333;
    margin-top:10px;
    cursor:pointer;
}

.result:hover{
    background:#111;
}

.artist{ opacity:.7; }

iframe{
    width:560px;
    height:315px;
    border:0;
}

#lyrics{
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<div id="app">
    <h1>Lyrics Prompter PRO</h1>
    <input id="search" placeholder="曲名 or アーティスト">
    <div id="results"></div>
</div>

<script>

const searchBox = document.getElementById("search");
const results = document.getElementById("results");

let timer;
let player = null;
let mode = "auto";

// =======================
// YouTube API READY
// =======================
function onYouTubeIframeAPIReady(){
    console.log("YT READY");
}

// =======================
// 検索
// =======================
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();
    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>searchSongs(q),300);
});

async function searchSongs(q){

    results.innerHTML = "検索中...";

    const url =
    "https://itunes.apple.com/search?term="
    + encodeURIComponent(q)
    + "&entity=song&limit=20";

    const res = await fetch(url);
    const data = await res.json();

    results.innerHTML = "";

    data.results.forEach(track=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${track.trackName}</div>
            <div class="artist">${track.artistName}</div>
        `;

        div.onclick = ()=>selectTrack(track);

        results.appendChild(div);
    });
}

// =======================
// 歌詞取得
// =======================
async function selectTrack(track){

    results.innerHTML = "歌詞検索中...";

    const url =
    "https://lrclib.net/api/search?"
    + "track_name=" + encodeURIComponent(track.trackName)
    + "&artist_name=" + encodeURIComponent(track.artistName);

    const res = await fetch(url);
    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;

        div.onclick = ()=>start(item);

        results.appendChild(div);
    });
}

// =======================
// LRC
// =======================
function parseLRC(lrc){

    const out = [];

    lrc.split("\n").forEach(l=>{

        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return;

        out.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        });
    });

    return out;
}

// =======================
// 開始
// =======================
function start(item){

    let lines;

    if(item.syncedLyrics){
        lines = parseLRC(item.syncedLyrics);
    }else{
        lines = item.plainLyrics
        .split("\n")
        .filter(v=>v.trim())
        .map(t=>({time:0,text:t}));
    }

    show(lines);
}

// =======================
// メイン
// =======================
function show(lines){

    document.body.innerHTML = "";
    document.body.style.background = "#000";

    let index = 0;

    const container = document.createElement("div");
    container.style.padding = "30px";
    document.body.appendChild(container);

    const videoArea = document.createElement("div");
    const lyricsArea = document.createElement("div");

    container.appendChild(videoArea);
    container.appendChild(lyricsArea);

    // =======================
    // YouTube
    // =======================
    const url = prompt("YouTube URL");
    const videoId = getYoutubeId(url);

    if(videoId){

        player = new YT.Player(videoArea, {
            videoId: videoId,
            width: 560,
            height: 315
        });
    }

    // =======================
    // render
    // =======================
    function render(){

        lyricsArea.innerHTML = `
            <div style="font-size:40px;opacity:.4">${lines[index+1]?.text||""}</div>
            <div style="font-size:80px;margin:20px 0;font-weight:bold">${lines[index]?.text||""}</div>
            <div style="font-size:40px;opacity:.2">${lines[index+2]?.text||""}</div>
        `;
    }

    render();

    // =======================
    // 同期（本体）
    // =======================
    const sync = setInterval(()=>{

        if(!player || !player.getCurrentTime) return;

        const t = player.getCurrentTime();

        for(let i=0;i<lines.length;i++){

            if(lines[i].time > t){

                index = Math.max(0,i-1);
                render();
                break;
            }
        }

    },100);

    // =======================
    // 操作
    // =======================
    document.onkeydown = (e)=>{

        if(e.key==="ArrowRight"){
            index++;
            render();
        }

        if(e.key==="ArrowLeft"){
            index = Math.max(0,index-1);
            render();
        }

        if(e.key==="f"){
            if(!document.fullscreenElement){
                document.documentElement.requestFullscreen();
            }else{
                document.exitFullscreen();
            }
        }

        if(e.key==="m"){
            mode = mode==="auto"?"manual":"auto";
        }

    };
}

// =======================
// YouTube ID
// =======================
function getYoutubeId(url){

    if(!url) return "";

    const m = url.match(/(?:v=|youtu\.be\/)([^&]+)/i);
    return m ? m[1] : "";
}

</script>

</body>
</html>
