<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

/* screen */
.screen{display:none;padding:10px;}
.screen.active{display:block;}

/* =========================
   TOP
========================= */
#search{
    width:100%;
    font-size:20px;
    padding:10px;
    box-sizing:border-box;
}

.result{
    padding:10px;
    border:1px solid #333;
    margin-top:6px;
}

/* =========================
   PLAYER LAYOUT（重要）
========================= */
#playerWrap{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

/* ★動画を小さく固定 */
.player{
    width:320px;
    height:180px;
}

/* =========================
   LYRICS AREA（拡張）
========================= */
#lyricsWrap{
    height:calc(100vh - 260px);
    overflow-y:auto;
    border:1px solid #222;
    margin-top:10px;
}

/* 行 */
.line{
    text-align:center;
    padding:10px;
    min-height:42px;
}

.now{
    font-size:54px;
    font-weight:bold;
}

.side{
    font-size:26px;
    opacity:.35;
}

/* =========================
   BOTTOM BAR
========================= */
.bottomBar{
    position:fixed;
    bottom:8px;
    left:8px;
    right:8px;
    display:flex;
    justify-content:space-between;
    z-index:9999;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
}

/* warn */
#warn{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:24px;
    line-height:24px;
    font-size:12px;
    background:rgba(255,0,0,0.8);
    text-align:center;
    display:none;
}
</style>
</head>

<body>

<div id="warn"></div>

<!-- TOP -->
<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter</h1>
    <input id="search">
    <div id="results"></div>
</div>

<!-- PLAYER -->
<div id="playerScreen" class="screen">

    <!-- 小さい動画 -->
    <div id="playerWrap"></div>

    <!-- 歌詞メイン -->
    <div id="lyricsWrap"></div>

    <div class="bottomBar">
        <button id="modeBtn">AUTO</button>
        <button id="syncBtn">SYNC</button>
        <button id="backBtn">TOP</button>
    </div>

</div>

<script>

const state={
    player:null,
    lines:[],
    index:0,
    mode:"auto",
    offset:0
};

/* ================= render ================= */
function render(){

    const wrap=document.getElementById("lyricsWrap");
    const scroll=wrap.scrollTop;

    wrap.innerHTML="";

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");
        d.className="line";

        if(i===state.index) d.classList.add("now");
        else d.classList.add("side");

        d.textContent=l.text;
        wrap.appendChild(d);
    });

    if(state.mode==="auto"){
        const el=wrap.children[state.index];
        if(el){
            el.scrollIntoView({block:"center",behavior:"smooth"});
        }
    }else{
        wrap.scrollTop=scroll;
    }
}

/* ================= sync loop ================= */
function loop(){

    if(state.mode!=="auto") return;

    const t=state.player.getCurrentTime();

    for(let i=0;i<state.lines.length;i++){
        const next=state.lines[i+1];
        if(!next||next.time>t){
            state.index=i;
            render();
            break;
        }
    }
}

/* ================= wheel ================= */
document.getElementById("lyricsWrap").addEventListener("wheel",(e)=>{

    if(state.mode==="auto") return;

    const dir=e.deltaY>0?1:-1;

    state.index=Math.max(0,Math.min(state.lines.length-1,state.index+dir));

    render();

},{passive:true});

</script>

</body>
</html>
