<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.screen{display:none;padding:20px;}
.screen.active{display:block;}

#search{width:100%;font-size:22px;padding:12px;}
.result{padding:10px;border:1px solid #333;margin-top:8px;cursor:pointer;}
.result:hover{background:#111;}
.artist{opacity:.6;}

.player{width:100%;max-width:480px;aspect-ratio:16/9;margin:20px auto;}

#lyricsWrap{height:320px;overflow:hidden;margin-top:20px;}
#lyrics{transition:transform .2s ease;}

.line{text-align:center;padding:8px 0;}
.now{font-size:60px;font-weight:bold;}
.side{opacity:.4;font-size:28px;}

#controls{position:fixed;bottom:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap;}
button{background:#111;color:#fff;border:1px solid #333;padding:6px 10px;}
button:hover{background:#222;}

.topbar{position:fixed;top:10px;left:10px;}
</style>
</head>

<body>

<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<div id="playerScreen" class="screen">

    <div class="topbar">
        <button id="backBtn">← TOP</button>
    </div>

    <div id="playerWrap"></div>

    <div id="lyricsWrap">
        <div id="lyrics"></div>
    </div>
</div>

<div id="controls"></div>

<script>

const state = {
    player:null,
    ready:false,
    lines:[],
    index:0,
    offset:0,
    mode:"auto",
    timer:null
};

let ytReady = false;

/* ================= YT API ================= */
function onYouTubeIframeAPIReady(){
    ytReady = true;
}

/* ================= UI ================= */
const topScreen = document.getElementById("topScreen");
const playerScreen = document.getElementById("playerScreen");
const results = document.getElementById("results");
const searchBox = document.getElementById("search");

let timer;

function showScreen(s){
    topScreen.classList.remove("active");
    playerScreen.classList.remove("active");
    if(s==="top") topScreen.classList.add("active");
    if(s==="player") playerScreen.classList.add("active");
}

/* ================= SEARCH ================= */
searchBox.addEventListener("input",()=>{
    clearTimeout(timer);
    const q=searchBox.value.trim();
    if(q.length<2){results.innerHTML="";return;}
    timer=setTimeout(()=>search(q),300);
});

async function search(q){
    results.innerHTML="検索中...";
    const res=await fetch("https://itunes.apple.com/search?term="+encodeURIComponent(q)+"&entity=song&country=JP&limit=20");
    const data=await res.json();

    results.innerHTML="";
    data.results.forEach(t=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`<div>${t.trackName}</div><div class="artist">${t.artistName}</div>`;
        d.onclick=()=>fetchLyrics(t);
        results.appendChild(d);
    });
}

/* ================= LYRICS ================= */
async function fetchLyrics(track){

    results.innerHTML="歌詞取得中...";

    const res=await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data=await res.json();

    results.innerHTML="";

    data.forEach(item=>{
        const d=document.createElement("div");
        d.className="result";
        d.innerHTML=`<div>${item.trackName}</div>`;
        d.onclick=()=>start(item);
        results.appendChild(d);
    });
}

/* ================= PARSE ================= */
function parseLRC(lrc){
    return lrc.split("\n")
    .map(l=>{
        const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;
        return {
            time:parseInt(m[1])*60+parseFloat(m[2]),
            text:m[3].trim()
        };
    })
    .filter(Boolean);
}

/* ================= START ================= */
function start(item){

    state.lines = item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map((t,i)=>({time:i*3,text:t}));

    buildPlayer();
    showScreen("player");
    buildControls();
}

/* ================= PLAYER ================= */
function buildPlayer(){

    const wrap=document.getElementById("playerWrap");
    wrap.innerHTML="";

    const div=document.createElement("div");
    div.className="player";
    wrap.appendChild(div);

    const url=prompt("YouTube URL");
    const id=getYoutubeId(url);

    if(state.player){
        state.player.destroy();
        state.player=null;
        state.ready=false;
    }

    state.player=new YT.Player(div,{
        videoId:id,
        width:480,
        height:270,
        events:{
            onReady:()=>{
                state.ready=true;
                state.player.playVideo();
                startSync();
            }
        }
    });

    state.index=0;
}

/* ================= CONTROLS ================= */
function buildControls(){

    const c=document.getElementById("controls");

    c.innerHTML=`
        <button id="mode">${state.mode}</button>
        <button id="sync">sync</button>
        <button id="up">+offset</button>
        <button id="down">-offset</button>
    `;

    document.getElementById("mode").onclick=()=>{
        state.mode = state.mode==="auto"?"manual":"auto";
        document.getElementById("mode").innerText=state.mode;
    };

    document.getElementById("sync").onclick=()=>{
        const t=state.player.getCurrentTime();
        const lt=state.lines[state.index]?.time||0;
        state.offset=lt-t;
    };

    document.getElementById("up").onclick=()=>state.offset+=0.1;
    document.getElementById("down").onclick=()=>state.offset-=0.1;
}

/* ================= SYNC ================= */
function startSync(){

    if(state.timer) clearInterval(state.timer);

    state.timer=setInterval(()=>{

        if(!state.ready||!state.player) return;

        const t=state.player.getCurrentTime()+state.offset;

        if(state.mode==="auto"){

            for(let i=0;i<state.lines.length;i++){
                const next=state.lines[i+1];
                if(!next||next.time>t){
                    state.index=i;
                    render();
                    break;
                }
            }
        }

    },100);
}

/* ================= KEY ================= */
document.onkeydown=(e)=>{

    if(state.mode!=="manual") return;

    if(e.key==="ArrowRight"){
        state.index=Math.min(state.lines.length-1,state.index+1);
        render();
    }

    if(e.key==="ArrowLeft"){
        state.index=Math.max(0,state.index-1);
        render();
    }
};

/* ================= RENDER ================= */
function render(){

    const wrap=document.getElementById("lyrics");
    wrap.innerHTML="";

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");
        d.className="line";

        if(i===state.index) d.classList.add("now");
        else d.classList.add("side");

        d.textContent=l.text;
        wrap.appendChild(d);
    });

    document.getElementById("lyrics").style.transform=
        `translateY(${-state.index*70}px)`;
}

/* ================= BACK ================= */
document.getElementById("backBtn").onclick=()=>{

    if(state.player){
        state.player.destroy();
        state.player=null;
    }

    state.ready=false;
    state.index=0;

    showScreen("top");
};

/* ================= UTIL ================= */
function getYoutubeId(url){
    const m=url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m?m[1]:"";
}

</script>

</body>
</html>
