<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lyrics Prompter</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

#app{
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    font-size:24px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:15px;
    border:1px solid #333;
    margin-top:10px;
    cursor:pointer;
}

.result:hover{
    background:#111;
}

.artist{
    opacity:.7;
}

#videoArea iframe{
    width:100%;
    max-width:560px;
    height:315px;
}
</style>
</head>

<body>

<div id="app">
    <h1>Lyrics Prompter</h1>
    <input id="search" placeholder="曲名またはアーティスト">
    <div id="results"></div>
</div>

<script>

const searchBox = document.getElementById("search");
const results = document.getElementById("results");

let timer;

// ----------------------
// 検索
// ----------------------
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();

    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>searchSongs(q),300);
});

async function searchSongs(q){

    results.innerHTML = "検索中...";

    try{

        const url =
        "https://itunes.apple.com/search?term="
        + encodeURIComponent(q)
        + "&entity=song&limit=30";

        const res = await fetch(url);
        const data = await res.json();

        results.innerHTML = "";

        data.results.forEach(track=>{

            const div = document.createElement("div");
            div.className = "result";

            div.innerHTML = `
                <div>${track.trackName}</div>
                <div class="artist">${track.artistName}</div>
            `;

            div.onclick = ()=>selectTrack(track);

            results.appendChild(div);

        });

    }catch(e){
        results.innerHTML = "検索失敗";
    }
}

// ----------------------
// 歌詞検索
// ----------------------
async function selectTrack(track){

    results.innerHTML = "歌詞検索中...";

    try{

        const url =
        "https://lrclib.net/api/search?"
        + "track_name=" + encodeURIComponent(track.trackName)
        + "&artist_name=" + encodeURIComponent(track.artistName);

        const res = await fetch(url);
        const data = await res.json();

        results.innerHTML = "";

        if(!data.length){
            results.innerHTML = "歌詞なし";
            return;
        }

        data.forEach(item=>{

            const div = document.createElement("div");
            div.className = "result";

            div.innerHTML = `
                <div>${item.trackName}</div>
                <div class="artist">${item.artistName}</div>
            `;

            div.onclick = ()=>loadLyrics(item);

            results.appendChild(div);

        });

    }catch(e){
        results.innerHTML = "歌詞取得失敗";
    }
}

// ----------------------
// 歌詞ロード
// ----------------------
function loadLyrics(item){

    let lines;

    if(item.syncedLyrics){
        lines = parseLRC(item.syncedLyrics);
    }else{
        lines = item.plainLyrics
            .split("\n")
            .filter(v=>v.trim())
            .map(t=>({time:0,text:t}));
    }

    showLyrics(lines);
}

// ----------------------
// LRC解析
// ----------------------
function parseLRC(lrc){

    const result = [];

    lrc.split("\n").forEach(row=>{

        const m = row.match(/\[(\d+):(\d+\.\d+)\](.*)/);

        if(!m) return;

        result.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        });

    });

    return result;
}

// ----------------------
// メイン画面
// ----------------------
function showLyrics(lines){

    document.body.innerHTML = "";
    document.body.style.background = "#000";
    document.body.style.color = "#fff";

    let index = 0;

    const container = document.createElement("div");
    container.style.padding = "40px";
    document.body.appendChild(container);

    // ------------------
    // YouTube入力
    // ------------------
    const youtubeUrl = prompt("YouTube URLを入力");

    const videoArea = document.createElement("div");
    const lyricsArea = document.createElement("div");

    container.appendChild(videoArea);
    container.appendChild(lyricsArea);

    const videoId = getYoutubeId(youtubeUrl);

    if(videoId){

        const iframe = document.createElement("iframe");

        iframe.width = "560";
        iframe.height = "315";
        iframe.src = "https://www.youtube.com/embed/" + videoId;
        iframe.allow = "autoplay; encrypted-media";
        iframe.allowFullscreen = true;

        videoArea.appendChild(iframe);
    }

    // ------------------
    // 描画
    // ------------------
    function render(){

        lyricsArea.innerHTML = `
            <div style="font-size:40px;opacity:.5">
                ${lines[index+1]?.text || ""}
            </div>

            <div style="font-size:80px;margin:30px 0;font-weight:bold">
                ${lines[index]?.text || ""}
            </div>

            <div style="font-size:40px;opacity:.3">
                ${lines[index+2]?.text || ""}
            </div>
        `;
    }

    render();

    // ------------------
    // 手動操作
    // ------------------
    document.onkeydown = (e)=>{

        if(e.key==="ArrowRight"){
            index = Math.min(lines.length-1,index+1);
            render();
        }

        if(e.key==="ArrowLeft"){
            index = Math.max(0,index-1);
            render();
        }

        if(e.key==="f"||e.key==="F"){
            if(!document.fullscreenElement){
                document.documentElement.requestFullscreen();
            }else{
                document.exitFullscreen();
            }
        }

        if(e.key==="s"||e.key==="S"){
            location.reload();
        }
    };
}

// ----------------------
// YouTube ID
// ----------------------
function getYoutubeId(url){

    const m = url.match(/(?:v=|youtu\.be\/)([^&]+)/i);
    return m ? m[1] : "";
}

</script>

</body>
</html>
