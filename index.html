<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

.screen{ display:none; padding:20px; }
.screen.active{ display:block; }

#search{
    width:100%;
    font-size:22px;
    padding:12px;
    box-sizing:border-box;
}

.result{
    padding:12px;
    border:1px solid #333;
    margin-top:8px;
    cursor:pointer;
}

.result:hover{ background:#111; }

.artist{ opacity:.7; }

.player{
    width:100%;
    max-width:480px;
    aspect-ratio:16/9;
    margin:20px auto;
}

#lyrics{
    text-align:center;
    margin-top:30px;
}

#controls{
    position:fixed;
    bottom:10px;
    left:10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    z-index:9999;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
    cursor:pointer;
}

button:hover{ background:#222; }

.topbar{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
}
</style>
</head>

<body>

<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter Laule'a</h1>
    <input id="search" placeholder="曲名 / アーティスト">
    <div id="results"></div>
</div>

<div id="playerScreen" class="screen">

    <div class="topbar">
        <button id="backBtn">← TOP</button>
    </div>

    <div id="playerWrap"></div>
    <div id="lyrics"></div>
</div>

<div id="controls"></div>

<script>

/* =========================
   STATE
========================= */
const state = {
    player: null,
    lines: [],
    index: 0,
    speed: 1,
    offset: 0,
    syncStarted: false
};

const topScreen = document.getElementById("topScreen");
const playerScreen = document.getElementById("playerScreen");
const results = document.getElementById("results");
const searchBox = document.getElementById("search");

let timer;

/* =========================
   SCREEN
========================= */
function showScreen(name){
    topScreen.classList.remove("active");
    playerScreen.classList.remove("active");

    if(name==="top") topScreen.classList.add("active");
    if(name==="player") playerScreen.classList.add("active");
}

/* =========================
   SEARCH (iTunes + JPスコア)
========================= */
searchBox.addEventListener("input",()=>{

    clearTimeout(timer);

    const q = searchBox.value.trim();
    if(q.length < 2){
        results.innerHTML = "";
        return;
    }

    timer = setTimeout(()=>search(q),300);
});

function score(track){

    let s = 0;

    if(/[ぁ-んァ-ン一-龥]/.test(track.trackName)) s += 2;
    if(/[ぁ-んァ-ン一-龥]/.test(track.artistName)) s += 2;

    if(/jpop|j-pop|anime|cover/i.test(track.trackName)) s += 1;

    return s;
}

async function search(q){

    results.innerHTML = "検索中...";

    const url =
        "https://itunes.apple.com/search"
        + "?term=" + encodeURIComponent(q)
        + "&entity=song"
        + "&country=JP"
        + "&limit=30";

    const res = await fetch(url);
    const data = await res.json();

    data.results.sort((a,b)=>score(b)-score(a));

    results.innerHTML = "";

    data.results.forEach(t=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${t.trackName}</div>
            <div class="artist">${t.artistName}</div>
        `;

        div.onclick = ()=>fetchLyrics(t);

        results.appendChild(div);
    });
}

/* =========================
   LYRICS
========================= */
async function fetchLyrics(track){

    results.innerHTML = "歌詞取得中...";

    const res = await fetch(
        `https://lrclib.net/api/search?track_name=${encodeURIComponent(track.trackName)}&artist_name=${encodeURIComponent(track.artistName)}`
    );

    const data = await res.json();

    results.innerHTML = "";

    data.forEach(item=>{

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <div>${item.trackName}</div>
            <div class="artist">${item.artistName}</div>
        `;

        div.onclick = ()=>start(item);

        results.appendChild(div);
    });
}

/* =========================
   PARSE LRC
========================= */
function parseLRC(lrc){

    return lrc.split("\n")
    .map(l=>{
        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(!m) return null;

        return {
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3].trim()
        };
    })
    .filter(Boolean);
}

/* =========================
   START
========================= */
function start(item){

    state.lines = item.syncedLyrics
        ? parseLRC(item.syncedLyrics)
        : item.plainLyrics.split("\n")
            .filter(v=>v.trim())
            .map(t=>({time:0,text:t}));

    buildPlayer();
    showScreen("player");
    buildControls();
}

/* =========================
   PLAYER（修正済み）
========================= */
function buildPlayer(){

    const wrap = document.getElementById("playerWrap");
    wrap.innerHTML = "";

    const div = document.createElement("div");
    div.className = "player";

    wrap.appendChild(div);

    const url = prompt("YouTube URL");
    const id = getYoutubeId(url);

    if(state.player){
        state.player.destroy();
        state.player = null;
    }

    if(!id){
        alert("YouTube ID取得失敗");
        return;
    }

    // ★ ytReady依存削除（ここ重要）
    state.player = new YT.Player(div, {
        videoId: id,
        width: 480,
        height: 270,
        events:{
            onReady: ()=>{
                console.log("READY");
                state.player.playVideo(); // ★必須
                startSync();
            }
        }
    });

    state.index = 0;
    render();
}

/* =========================
   CONTROLS
========================= */
function buildControls(){

    const c = document.getElementById("controls");

    c.innerHTML = `
        <button id="speedDown">-speed</button>
        <button id="speedUp">+speed</button>
        <button id="offsetDown">-offset</button>
        <button id="offsetUp">+offset</button>
        <button id="sync">sync</button>
        <button id="reset">reset</button>
        <button id="fs">fullscreen</button>
    `;

    document.getElementById("speedUp").onclick = ()=> state.speed = Math.min(3,state.speed+0.1);
    document.getElementById("speedDown").onclick = ()=> state.speed = Math.max(0.3,state.speed-0.1);

    document.getElementById("offsetUp").onclick = ()=> state.offset += 0.1;
    document.getElementById("offsetDown").onclick = ()=> state.offset -= 0.1;

    document.getElementById("sync").onclick = ()=>{
        const t = state.player.getCurrentTime();
        const lt = state.lines[state.index]?.time || 0;
        state.offset = lt - t;
    };

    document.getElementById("reset").onclick = ()=>{
        state.index = 0;
        if(state.player) state.player.seekTo(0);
        render();
    };

    document.getElementById("fs").onclick = ()=>{
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen();
        }else{
            document.exitFullscreen();
        }
    };
}

/* =========================
   SYNC LOOP（安定版）
========================= */
function startSync(){

    if(state.syncStarted) return;
    state.syncStarted = true;

    setInterval(()=>{

        if(!state.player) return;

        const t = state.player.getCurrentTime() + state.offset;
        const a = t * state.speed;

        const lines = state.lines;
        if(!lines || lines.length === 0) return;

        for(let i=0;i<lines.length;i++){

            if(lines[i].time > a){
                state.index = Math.max(0,i-1);
                render();
                break;
            }
        }

    },120);
}

/* =========================
   RENDER
========================= */
function render(){

    const i = state.index;
    const l = state.lines;

    document.getElementById("lyrics").innerHTML = `
        <div style="font-size:36px;opacity:.5">${l[i-1]?.text||""}</div>
        <div style="font-size:70px;margin:20px 0;font-weight:bold">${l[i]?.text||""}</div>
        <div style="font-size:36px;opacity:.8">${l[i+1]?.text||""}</div>
    `;
}

/* =========================
   BACK
========================= */
document.getElementById("backBtn").onclick = ()=>{

    if(state.player){
        state.player.destroy();
        state.player = null;
    }

    state.syncStarted = false;
    state.index = 0;

    showScreen("top");
};

/* =========================
   UTIL
========================= */
function getYoutubeId(url){

    if(!url) return "";

    const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : "";
}

</script>

</body>
</html>
