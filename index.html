<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lyrics Prompter Laule'a</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

.screen{display:none;padding:20px;}
.screen.active{display:block;}

#lyricsWrap{
    height:70vh;
    overflow-y:auto;
    border:1px solid #222;
}

/* 行は固定レイアウト */
.line{
    text-align:center;
    padding:10px;
    min-height:44px;
    transition:background 0.1s;
}

.now{
    font-size:58px;
    font-weight:bold;
    background:#111;
}

.side{
    font-size:28px;
    opacity:.35;
}

/* bottom */
.bottomBar{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
}
button{
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px 10px;
}
</style>
</head>

<body>

<div id="topScreen" class="screen active">
    <h1>Lyrics Prompter</h1>
    <input id="search">
    <div id="results"></div>
</div>

<div id="playerScreen" class="screen">

    <div id="playerWrap"></div>
    <div id="lyricsWrap"></div>

    <div class="bottomBar">
        <button id="modeBtn">AUTO</button>
        <button id="syncBtn">SYNC</button>
        <button id="backBtn">TOP</button>
    </div>

</div>

<script>

const state={
    player:null,
    lines:[],
    index:0,
    mode:"auto",
    offset:0,
    lockScroll:false
};

/* ===================== RENDER（重要修正） ===================== */
function render(){

    const wrap=document.getElementById("lyricsWrap");

    const scrollPos = wrap.scrollTop; // ★保持

    wrap.innerHTML="";

    state.lines.forEach((l,i)=>{

        const d=document.createElement("div");
        d.className="line";

        if(i===state.index) d.classList.add("now");
        else d.classList.add("side");

        d.textContent=l.text;
        wrap.appendChild(d);
    });

    // ★AUTOのときだけスクロール制御
    if(state.mode==="auto"){
        const target=wrap.children[state.index];
        if(target){
            target.scrollIntoView({
                block:"center",
                behavior:"smooth"
            });
        }
    }else{
        // MANUALは絶対に触らない
        wrap.scrollTop=scrollPos;
    }
}

/* ===================== SYNC LOOP ===================== */
function loop(){

    if(state.mode!=="auto") return;

    const t=state.player.getCurrentTime();

    for(let i=0;i<state.lines.length;i++){
        const next=state.lines[i+1];
        if(!next||next.time>t){
            state.index=i;
            render();
            break;
        }
    }
}

/* ===================== WHEEL ===================== */
document.getElementById("lyricsWrap").addEventListener("wheel",(e)=>{

    if(state.mode==="auto") return;

    if(state.lockScroll) return;

    state.lockScroll=true;

    const dir=e.deltaY>0?1:-1;

    state.index=Math.max(0,Math.min(state.lines.length-1,state.index+dir));

    render();

    setTimeout(()=>state.lockScroll=false,80);

},{passive:true});

/* ===================== MODE ===================== */
document.getElementById("modeBtn").onclick=()=>{
    state.mode=state.mode==="auto"?"manual":"auto";
    document.getElementById("modeBtn").textContent=state.mode.toUpperCase();
};

/* ===================== SYNC ===================== */
document.getElementById("syncBtn").onclick=()=>{
    const t=state.player.getCurrentTime();
    const lt=state.lines[state.index]?.time;
    state.offset=lt-t;
};

</script>

</body>
</html>
